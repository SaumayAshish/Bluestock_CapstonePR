# PostgreSQL Client Authentication Configuration
# This file controls: which hosts are allowed to connect, how clients
# are authenticated, which PostgreSQL user names they can use, which
# databases they can access.  Records take one of these forms:
#
# local      DATABASE  USER  METHOD  [OPTIONS]
# host       DATABASE  USER  ADDRESS  METHOD  [OPTIONS]
# hostssl    DATABASE  USER  ADDRESS  METHOD  [OPTIONS]
# hostnossl  DATABASE  USER  ADDRESS  METHOD  [OPTIONS]
#
# (The uppercase items must be replaced by actual values.)
#
# The first field is the connection type: "local" is a Unix-socket
# connection, "host" is a plain TCP/IP socket connection, and "hostssl" is
# an SSL or GSSAPI encrypted TCP/IP socket connection.
#
# DATABASE can be "all", "sameuser", "samerole", a database name, or
# a comma-separated list thereof. The "all" keyword does not match
# databases created later.
#
# USER can be "all", a user name, a group name prefixed with "+", or
# a comma-separated list thereof.  In both the database and user fields
# you can also use lists enclosed in brackets, e.g. "user1,+group1".
#
# ADDRESS specifies the set of hosts the record applies to.  It can be a
# host name only, * to match any host on the internet, CIDR notation, or an
# IP address in IPv4 or IPv6 format. Mask length determines IPv4 vs IPv6
# (e.g. 0.0.0.0/0 is IPv4, ::0/0 is IPv6).
#
# METHOD can be "trust", "reject", "md5", "password", "scram-sha-256",
# "gss", "sspi", "ident", "peer", "pam", "ldap", "radius" or "cert".
#
# Note: "password" and "md5" are deprecated in PostgreSQL 10 and later.
# Use "scram-sha-256" for new installations.
#
# CIDR notation: IPV4/MASK, IPV6/MASK

# TYPE  DATABASE        USER            ADDRESS                 METHOD
# "local" is for Unix domain socket connections only
local   all             all                                     trust
# IPv4 local connections:
host    all             all             127.0.0.1/32            trust
host    all             all             0.0.0.0/0               trust
# IPv6 local connections:
host    all             all             ::1/128                 trust
# IPv6 global connections
host    all             all             ::/0                    trust
