services:
  postgres:
    image: postgres:16
    container_name: bluestock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bluestock
      POSTGRES_USER: bluestock
      POSTGRES_PASSWORD: bluestock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: bluestock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
